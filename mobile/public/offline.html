<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Descall – Offline</title>
  <style>
    body {
      margin: 0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      color: #f0f0ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      gap: 20px;
      text-align: center;
      padding: 24px;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      background: linear-gradient(135deg, #7c5cfc, #c084fc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 900;
      color: white;
      margin: 0 auto;
    }
    h1 { font-size: 22px; font-weight: 800; margin: 0; }
    p { font-size: 15px; color: #9090b8; margin: 0; line-height: 1.5; }
    button {
      margin-top: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #7c5cfc, #9370ff);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .emoji { font-size: 48px; }
  </style>
</head>
<body>
  <div class="emoji">📡</div>
  <div class="icon">D</div>
  <h1>You're offline</h1>
  <p>Check your connection and try again.<br/>Your cached messages are still available.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
