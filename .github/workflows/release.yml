name: Build and Release Descall Electron

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [win]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Debug - Check dist contents
        working-directory: frontend
        shell: cmd
        run: |
          echo "=== dist folder contents ==="
          dir dist /s
          echo "=== Checking assets ==="
          if exist dist\assets\*.js (echo "JS files found") else (echo "ERROR: No JS files in assets!")

      - name: Sync version from tag
        working-directory: frontend/electron
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          $tagName = "${env:GITHUB_REF_NAME}" -replace '^v',''
          Write-Host "New version: $tagName"
          (Get-Content package.json) -replace '"version": "[^"]+"', "`"version`": `"$tagName`"" | Set-Content package.json
          Get-Content package.json | Select-String "version"

      - name: Install Electron dependencies
        working-directory: frontend/electron
        run: npm install

      - name: Build Electron app
        working-directory: frontend/electron
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"
          ELECTRON_BUILDER_CACHE: "true"

      - name: List build output
        working-directory: frontend/electron
        shell: cmd
        run: |
          echo "=== Build output ==="
          dir dist /s
          echo "=== Looking for .exe files ==="
          dir dist\*.exe /s /b

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-${{ matrix.platform }}
          path: frontend/electron/dist/**
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: electron-build-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/Descall-Setup-*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # update-download-page job removed - version is now fetched dynamically from GitHub API
